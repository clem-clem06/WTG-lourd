# ============================================================
#  Connexion à la base de données MySQL (même BDD que Symfony)
# ============================================================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/worktogether?serverTimezone=Europe/Paris&useSSL=false&allowPublicKeyRetrieval=true
#                                                                                                                       ↑                    ↑
#  useSSL=false          : désactive SSL en local (sinon erreur avec MySQL 8)
#  allowPublicKeyRetrieval=true : nécessaire pour MySQL 8 sans SSL

spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
#  JPA / Hibernate
# ============================================================
# "none" = JPA ne touche pas à la BDD, les tables existent déjà (créées par Symfony)
# "validate" aurait vérifié que les colonnes correspondent exactement → risque d'erreur
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Affiche les requêtes SQL générées (utile pour déboguer)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
#  Port du serveur
# ============================================================
server.port=8080
