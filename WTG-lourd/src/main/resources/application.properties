# ============================================================
#  Configuration par défaut — dev local.
#  En prod ou sur un poste avec une config différente :
#    - définir DB_USER / DB_PASSWORD / DB_URL via variables d'environnement,
#    - OU créer src/main/resources/application-local.properties (git-ignoré)
#      puis lancer avec -Dspring.profiles.active=local.
#  Voir application-local.properties.example pour un modèle.
# ============================================================

# ============================================================
#  Connexion à la base de données MySQL (même BDD que Symfony)
# ============================================================
#  useSSL=false                 : désactive SSL en local (sinon erreur avec MySQL 8)
#  allowPublicKeyRetrieval=true : nécessaire pour MySQL 8 sans SSL
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/worktogether?serverTimezone=Europe/Paris&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
#  JPA / Hibernate
# ============================================================
# "none" = JPA ne touche pas à la BDD, les tables existent déjà (créées par Symfony)
# "validate" aurait vérifié que les colonnes correspondent exactement → risque d'erreur
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Affiche les requêtes SQL générées (utile pour déboguer)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
